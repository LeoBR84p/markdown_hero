name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=markdown_hero --cov-report=term-missing
      - name: Run pyright
        run: |
          pip install pyright
          pyright markdown_hero/ tests/

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli
      - run: markdownlint --config .markdownlint.json README.md docs/

  audit-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Audit direct dependencies for known CVEs
        run: |
          python -m pip install --upgrade pip pip-audit
          # We audit only the package declared in pyproject; transitive
          # vulnerabilities are reported but do not fail the build until
          # a fix is available upstream.
          pip-audit --strict --requirement <(python -c "
          import tomllib
          with open('pyproject.toml','rb') as f:
              data = tomllib.load(f)
          for d in data['project']['dependencies']:
              print(d)
          ")
