name: Bug report
description: Report a defect in markdown_hero
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        For security vulnerabilities **do not use this form**. Please follow
        [`SECURITY.md`](../SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: When I called `extract_chunks(...)` with X, I expected Y but got Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest Markdown sample and Python snippet that triggers the bug.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: markdown_hero version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
    validations:
      required: true
